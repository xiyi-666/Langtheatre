server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location /graphql {
    proxy_pass http://linguaquest-server:8177/graphql;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /healthz {
    proxy_pass http://linguaquest-server:8177/healthz;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
  }

  location /readyz {
    proxy_pass http://linguaquest-server:8177/readyz;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
  }

  location /media-proxy {
    proxy_pass http://linguaquest-server:8177/media-proxy;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
