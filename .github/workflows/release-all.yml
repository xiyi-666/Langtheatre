name: release-all

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  web:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      VITE_API_URL: /graphql
      VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
      - run: npm run build --workspace apps/client
      - uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: apps/client/dist

  desktop:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    env:
      VITE_API_URL: ${{ secrets.VITE_API_URL_PROD }}
      VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: dtolnay/rust-toolchain@stable
      - run: npm install
      - name: Validate Tauri icon source
        shell: bash
        run: |
          test -f apps/client/src-tauri/icons/app-icon.svg || (echo "Missing apps/client/src-tauri/icons/app-icon.svg" && exit 1)

      - name: Generate Tauri icons (CI)
        working-directory: apps/client
        run: npx tauri icon src-tauri/icons/app-icon.svg

      - name: Validate generated platform icons
        shell: bash
        run: |
          test -f apps/client/src-tauri/icons/icon.ico || (echo "Missing generated Windows icon: apps/client/src-tauri/icons/icon.ico" && exit 1)
          test -f apps/client/src-tauri/icons/icon.icns || (echo "Missing generated macOS icon: apps/client/src-tauri/icons/icon.icns" && exit 1)

      - name: Build Tauri desktop app (Windows NSIS only)
        if: matrix.os == 'windows-latest'
        working-directory: apps/client
        run: npx tauri build --bundles nsis

      - name: Build Tauri desktop app (Non-Windows)
        if: matrix.os != 'windows-latest'
        run: npm run tauri:build --workspace apps/client
      - uses: actions/upload-artifact@v4
        with:
          name: tauri-${{ matrix.os }}
          path: apps/client/src-tauri/target/release/bundle/**

  android:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      VITE_API_URL: ${{ secrets.VITE_API_URL_PROD }}
      VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: android-actions/setup-android@v3
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi
      - run: npm install

      - name: Validate Tauri icon source
        shell: bash
        run: |
          test -f apps/client/src-tauri/icons/app-icon.svg || (echo "Missing apps/client/src-tauri/icons/app-icon.svg" && exit 1)

      - name: Generate Tauri icons (CI)
        working-directory: apps/client
        run: npx tauri icon src-tauri/icons/app-icon.svg

      - name: Validate generated common icon
        shell: bash
        run: |
          test -f apps/client/src-tauri/icons/icon.png || (echo "Missing generated icon: apps/client/src-tauri/icons/icon.png" && exit 1)

      - name: Init Android project (CI)
        run: npx tauri android init --ci
        working-directory: apps/client

      - name: Build Android app (release if keystore configured, else debug)
        shell: bash
        working-directory: apps/client
        run: |
          set -e
          MODE="--debug"

          if [ -n "$ANDROID_KEYSTORE_BASE64" ] && [ -n "$ANDROID_KEYSTORE_PASSWORD" ] && [ -n "$ANDROID_KEY_ALIAS" ] && [ -n "$ANDROID_KEY_PASSWORD" ]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > src-tauri/gen/android/release.keystore
            export TAURI_ANDROID_KEYSTORE_PATH="src-tauri/gen/android/release.keystore"
            export TAURI_ANDROID_KEYSTORE_PASSWORD="$ANDROID_KEYSTORE_PASSWORD"
            export TAURI_ANDROID_KEY_ALIAS="$ANDROID_KEY_ALIAS"
            export TAURI_ANDROID_KEY_PASSWORD="$ANDROID_KEY_PASSWORD"
            MODE=""
            echo "Keystore detected: using release build."
          else
            echo "Keystore secrets not fully configured: using debug build to keep CI green."
          fi

          for i in 1 2 3; do
            echo "Android build attempt $i/3 (mode: ${MODE:---release})"
            if npx tauri android build $MODE; then
              exit 0
            fi
            if [ "$i" -lt 3 ]; then
              echo "Build failed. Retrying in 20s..."
              sleep 20
            fi
          done
          echo "Android build failed after 3 attempts."
          exit 1

      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: apps/client/src-tauri/gen/android/app/build/outputs/**/*.apk

  docker-images:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata (server)
        id: meta-server
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/linguaquest-server
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha
            type=ref,event=tag

      - name: Build and push server image
        uses: docker/build-push-action@v6
        with:
          context: ./apps/server
          file: ./apps/server/Dockerfile
          push: true
          tags: ${{ steps.meta-server.outputs.tags }}
          labels: ${{ steps.meta-server.outputs.labels }}

      - name: Docker metadata (client)
        id: meta-client
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/linguaquest-client
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha
            type=ref,event=tag

      - name: Build and push client image
        uses: docker/build-push-action@v6
        with:
          context: ./apps/client
          file: ./apps/client/Dockerfile
          push: true
          tags: ${{ steps.meta-client.outputs.tags }}
          labels: ${{ steps.meta-client.outputs.labels }}

  release:
    runs-on: ubuntu-latest
    needs: [web, desktop, android]
    permissions:
      contents: write
    steps:
      - name: Download web dist
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: release-assets/web-dist

      - name: Download desktop bundles (Windows)
        uses: actions/download-artifact@v4
        with:
          name: tauri-windows-latest
          path: release-assets/tauri-windows

      - name: Download desktop bundles (macOS)
        uses: actions/download-artifact@v4
        with:
          name: tauri-macos-latest
          path: release-assets/tauri-macos

      - name: Download Android APK
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: release-assets/android

      - name: Prepare release asset names
        shell: bash
        run: |
          set -e
          TAG_NAME="${GITHUB_REF_NAME}"
          APK_PATH=$(find release-assets/android -type f -name "*.apk" | head -n 1)
          if [ -n "$APK_PATH" ]; then
            mv "$APK_PATH" "release-assets/LinguaQuest-android-${TAG_NAME}.apk"
          fi

          mkdir -p release-assets/filtered

          find release-assets/tauri-windows -type f \( -name "*setup*.exe" -o -name "*.msi" \) -print0 \
            | xargs -0 -I {} cp "{}" "release-assets/filtered/"

          find release-assets/tauri-macos -type f \( -name "*.dmg" -o -name "*.app.tar.gz" -o -name "*.app.zip" \) -print0 \
            | xargs -0 -I {} cp "{}" "release-assets/filtered/"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "LinguaQuest ${GITHUB_REF_NAME}"
          body: |
            Release: ${GITHUB_REF_NAME}

            Assets:
            - LinguaQuest-android-${GITHUB_REF_NAME}.apk
            - Windows setup (.exe)
            - macOS dmg / app archive
          files: |
            release-assets/LinguaQuest-android-${GITHUB_REF_NAME}.apk
            release-assets/filtered/**
