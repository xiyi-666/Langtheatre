name: release-all

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  web:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      VITE_API_URL: ${{ secrets.VITE_API_URL_PROD }}
      VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
      - run: npm run build --workspace apps/client
      - uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: apps/client/dist

  desktop:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    env:
      VITE_API_URL: ${{ secrets.VITE_API_URL_PROD }}
      VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: dtolnay/rust-toolchain@stable
      - run: npm install
      - run: npm run tauri:build --workspace apps/client
      - uses: actions/upload-artifact@v4
        with:
          name: tauri-${{ matrix.os }}
          path: apps/client/src-tauri/target/release/bundle/**

  android:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      VITE_API_URL: ${{ secrets.VITE_API_URL_PROD }}
      VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: android-actions/setup-android@v3
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi
      - run: npm install
      - name: Init Android project (CI)
        run: npx tauri android init --ci
        working-directory: apps/client
      - run: npm run tauri:android:build --workspace apps/client
      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: apps/client/src-tauri/gen/android/app/build/outputs/**/*.apk

  docker-images:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata (server)
        id: meta-server
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/linguaquest-server
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha
            type=ref,event=tag

      - name: Build and push server image
        uses: docker/build-push-action@v6
        with:
          context: ./apps/server
          file: ./apps/server/Dockerfile
          push: true
          tags: ${{ steps.meta-server.outputs.tags }}
          labels: ${{ steps.meta-server.outputs.labels }}

      - name: Docker metadata (client)
        id: meta-client
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/linguaquest-client
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha
            type=ref,event=tag

      - name: Build and push client image
        uses: docker/build-push-action@v6
        with:
          context: ./apps/client
          file: ./apps/client/Dockerfile
          push: true
          tags: ${{ steps.meta-client.outputs.tags }}
          labels: ${{ steps.meta-client.outputs.labels }}
