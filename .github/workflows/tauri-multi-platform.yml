name: tauri-multi-platform

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
  push:
    branches: [main, develop]
    paths:
      - "apps/client/**"
      - ".github/workflows/tauri-multi-platform.yml"
      - "package.json"
      - "package-lock.json"
  pull_request:
    paths:
      - "apps/client/**"
      - ".github/workflows/tauri-multi-platform.yml"
      - "package.json"
      - "package-lock.json"

jobs:
  build-desktop:
    name: build-${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    env:
      VITE_API_URL: http://61.244.24.7:8177/graphql
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: windows
          - os: macos-latest
            platform: macos

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux build dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install dependencies
        run: npm ci

      - name: Validate Tauri icon source
        shell: bash
        run: |
          test -f apps/client/src-tauri/icons/app-icon.svg || (echo "Missing apps/client/src-tauri/icons/app-icon.svg" && exit 1)

      - name: Generate Tauri icons
        working-directory: apps/client
        run: npx tauri icon src-tauri/icons/app-icon.svg

      - name: Build Tauri desktop app (Windows NSIS only)
        if: matrix.platform == 'windows'
        working-directory: apps/client
        run: npx tauri build --bundles nsis

      - name: Build Tauri desktop app (Non-Windows)
        if: matrix.platform != 'windows'
        run: npm run tauri:build

      - name: Upload desktop bundles
        uses: actions/upload-artifact@v4
        with:
          name: tauri-${{ matrix.platform }}-bundle
          path: apps/client/src-tauri/target/release/bundle/**
          if-no-files-found: error

  build-android:
    name: build-android
    runs-on: ubuntu-latest
    env:
      VITE_API_URL: http://61.244.24.7:8177/graphql
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Rust with Android targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi

      - name: Install dependencies
        run: npm ci

      - name: Validate Tauri icon source
        shell: bash
        run: |
          test -f apps/client/src-tauri/icons/app-icon.svg || (echo "Missing apps/client/src-tauri/icons/app-icon.svg" && exit 1)

      - name: Generate Tauri icons
        working-directory: apps/client
        run: npx tauri icon src-tauri/icons/app-icon.svg

      - name: Init Android project
        working-directory: apps/client
        run: npx tauri android init --ci

      - name: Build Android debug APK
        working-directory: apps/client
        run: npx tauri android build --debug

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tauri-android-apk
          path: apps/client/src-tauri/gen/android/app/build/outputs/**/*.apk
          if-no-files-found: error
