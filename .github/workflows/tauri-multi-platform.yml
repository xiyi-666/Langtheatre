name: tauri-multi-platform

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
  push:
    branches: [main, develop]
    tags:
      - "v*"
    paths:
      - "apps/client/**"
      - ".github/workflows/tauri-multi-platform.yml"
      - "package.json"
      - "package-lock.json"
  pull_request:
    paths:
      - "apps/client/**"
      - ".github/workflows/tauri-multi-platform.yml"
      - "package.json"
      - "package-lock.json"

jobs:
  build-desktop:
    name: build-${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    env:
      VITE_API_URL: ${{ secrets.VITE_API_URL_PROD }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: windows
          - os: macos-latest
            platform: macos

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux build dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install dependencies
        run: npm ci

      - name: Validate Tauri icon source
        shell: bash
        run: |
          test -f apps/client/src-tauri/icons/app-icon.svg || (echo "Missing apps/client/src-tauri/icons/app-icon.svg" && exit 1)

      - name: Generate Tauri icons
        working-directory: apps/client
        run: npx tauri icon src-tauri/icons/app-icon.svg

      - name: Build Tauri desktop app (Windows NSIS only)
        if: matrix.platform == 'windows'
        working-directory: apps/client
        run: npx tauri build --bundles nsis

      - name: Build Tauri desktop app (Non-Windows)
        if: matrix.platform != 'windows'
        run: npm run tauri:build

      - name: Upload desktop bundles
        uses: actions/upload-artifact@v4
        with:
          name: tauri-${{ matrix.platform }}-bundle
          path: apps/client/src-tauri/target/release/bundle/**
          if-no-files-found: error

  build-android:
    name: build-android
    runs-on: ubuntu-latest
    env:
      VITE_API_URL: ${{ secrets.VITE_API_URL_PROD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Rust with Android targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi

      - name: Install dependencies
        run: npm ci

      - name: Validate Tauri icon source
        shell: bash
        run: |
          test -f apps/client/src-tauri/icons/app-icon.svg || (echo "Missing apps/client/src-tauri/icons/app-icon.svg" && exit 1)

      - name: Generate Tauri icons
        working-directory: apps/client
        run: npx tauri icon src-tauri/icons/app-icon.svg

      - name: Init Android project
        working-directory: apps/client
        run: npx tauri android init --ci

      - name: Build Android debug APK
        working-directory: apps/client
        run: npx tauri android build --debug

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tauri-android-apk
          path: apps/client/src-tauri/gen/android/app/build/outputs/**/*.apk
          if-no-files-found: error

  release:
    name: release
    runs-on: ubuntu-latest
    needs: [build-desktop, build-android]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download desktop bundles (Windows)
        uses: actions/download-artifact@v4
        with:
          name: tauri-windows-bundle
          path: release-assets/tauri-windows

      - name: Download desktop bundles (macOS)
        uses: actions/download-artifact@v4
        with:
          name: tauri-macos-bundle
          path: release-assets/tauri-macos

      - name: Download Android APK
        uses: actions/download-artifact@v4
        with:
          name: tauri-android-apk
          path: release-assets/android

      - name: Prepare release assets
        shell: bash
        run: |
          set -e
          TAG_NAME="${GITHUB_REF_NAME}"

          mkdir -p release-assets/filtered

          APK_PATH=$(find release-assets/android -type f -name "*.apk" | head -n 1)
          if [ -n "$APK_PATH" ]; then
            cp "$APK_PATH" "release-assets/filtered/LinguaQuest-android-${TAG_NAME}.apk"
          fi

          find release-assets/tauri-windows -type f \( -name "*setup*.exe" -o -name "*.msi" \) -print0 \
            | xargs -0 -I {} cp "{}" "release-assets/filtered/"

          find release-assets/tauri-macos -type f \( -name "*.dmg" -o -name "*.app.tar.gz" -o -name "*.app.zip" \) -print0 \
            | xargs -0 -I {} cp "{}" "release-assets/filtered/"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "LinguaQuest release ${GITHUB_REF_NAME}"
          body: |
            Release: ${GITHUB_REF_NAME}

            Assets:
            - LinguaQuest-android-${GITHUB_REF_NAME}.apk
            - Windows setup (.exe)
            - macOS dmg / app archive
          files: |
            release-assets/filtered/**
