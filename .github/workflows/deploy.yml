name: deploy

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build-server:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: apps/server/go.sum
      - run: go mod tidy
      - run: go build -o linguaquest-api ./cmd/server
      - uses: actions/upload-artifact@v4
        with:
          name: linguaquest-api
          path: apps/server/linguaquest-api

  deploy-worker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npm install -g wrangler
      - run: wrangler deploy
        working-directory: infra/cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

  smoke-test:
    runs-on: ubuntu-latest
    needs: [build-server, deploy-worker]
    env:
      HEALTHCHECK_URL: ${{ secrets.HEALTHCHECK_URL }}
    steps:
      - name: Skip when healthcheck URL is not configured
        if: ${{ env.HEALTHCHECK_URL == '' }}
        run: echo "HEALTHCHECK_URL is empty. Skip smoke test."

      - name: Check health endpoint
        if: ${{ env.HEALTHCHECK_URL != '' }}
        run: |
          curl -fsSL "$HEALTHCHECK_URL" | tee health.json
