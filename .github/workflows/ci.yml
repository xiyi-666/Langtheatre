name: ci

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  pull_request:
  push:
    branches: [main, develop]

jobs:
  client:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
      - run: npm run lint --workspace apps/client
      - run: npm run typecheck --workspace apps/client
      - run: npm run test --workspace apps/client
      - run: npm run build --workspace apps/client

  server:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: apps/server/go.sum
      - run: go mod tidy
      - run: go test ./... -cover

  tauri-core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
      - run: npm run build --workspace apps/client

      - name: Validate frontendDist exists for Tauri
        shell: bash
        run: |
          test -d apps/client/dist || (echo "Missing apps/client/dist. Run frontend build before cargo check." && exit 1)

      - name: Install Linux dependencies for Tauri
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo check
        working-directory: apps/client/src-tauri

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
      - run: npx playwright install --with-deps chromium
      - run: npm run build --workspace apps/client
      - run: npm run test --workspace tests/e2e
